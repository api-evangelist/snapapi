specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SnapAPI
providerId: snapapi
created: '2026-05-27'
modified: '2026-05-27'
reconciled: true
sources:
  - https://snap.michaelcli.com
  - https://snap.michaelcli.com/openapi.json
tags:
  - Screenshots
  - Metadata Extraction
  - Text Extraction
  - PDF Generation
  - Headless Chromium
description: >-
  Machine-readable plans and pricing for SnapAPI. Four published tiers — Free,
  Starter, Basic, and Pro — plus a one-time $5 / 500-request bundle promoted on
  the homepage. Published values were scraped from https://snap.michaelcli.com
  on 2026-05-27. The Starter tier reflects the active "LAUNCH50" launch-week
  promotion (50% off first month — $2.50 instead of $5); list price restored
  after launch.
plans:
  - id: snapapi-free
    name: Free
    type: freemium
    description: >-
      Free entry tier for SnapAPI. 50 requests per month across all four
      endpoints (screenshot, metadata, text, PDF). No credit card required.
      Issued via self-service POST /api/signup.
    entries:
      - label: Monthly Request Quota
        description: Total requests per calendar month across all endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 50
        timeFrame: month
        geo: global
        domains:
          - https://snap.michaelcli.com
        unit: 1
        price: '0.00'
        priceCurrency: USD
        userMultiplied: false
    elements:
      - name: Screenshot Endpoint (PNG/JPEG)
      - name: Metadata Endpoint (Open Graph, Twitter Cards, meta tags)
      - name: Text Extraction Endpoint
      - name: PDF Generation Endpoint
      - name: Community Support
      - name: Self-Service API Key Signup
  - id: snapapi-starter
    name: Starter
    type: paid
    description: >-
      Entry paid tier. 500 requests per month at $5/month list price ($2.50 with
      the LAUNCH50 launch-week promo). Includes all four endpoints plus
      priority support.
    entries:
      - label: Monthly Request Quota
        description: Total requests per calendar month across all endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 500
        timeFrame: month
        geo: global
        domains:
          - https://snap.michaelcli.com
        unit: 1
        price: '5.00'
        priceCurrency: USD
        billingPeriod: month
        promoPrice: '2.50'
        promoCode: LAUNCH50
        userMultiplied: false
    elements:
      - name: Screenshot Endpoint (PNG/JPEG)
      - name: Metadata Endpoint
      - name: Text Extraction Endpoint
      - name: PDF Generation Endpoint
      - name: Priority Support
  - id: snapapi-basic
    name: Basic
    type: paid
    description: >-
      Mid-tier plan. 2,000 requests per month at $15/month. All four endpoints,
      priority support.
    entries:
      - label: Monthly Request Quota
        description: Total requests per calendar month across all endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 2000
        timeFrame: month
        geo: global
        domains:
          - https://snap.michaelcli.com
        unit: 1
        price: '15.00'
        priceCurrency: USD
        billingPeriod: month
        userMultiplied: false
    elements:
      - name: Screenshot Endpoint (PNG/JPEG)
      - name: Metadata Endpoint
      - name: Text Extraction Endpoint
      - name: PDF Generation Endpoint
      - name: Priority Support
  - id: snapapi-pro
    name: Pro
    type: paid
    description: >-
      Highest published subscription tier. 10,000 requests per month at
      $39/month. All four endpoints, dedicated support.
    entries:
      - label: Monthly Request Quota
        description: Total requests per calendar month across all endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 10000
        timeFrame: month
        geo: global
        domains:
          - https://snap.michaelcli.com
        unit: 1
        price: '39.00'
        priceCurrency: USD
        billingPeriod: month
        userMultiplied: false
    elements:
      - name: Screenshot Endpoint (PNG/JPEG)
      - name: Metadata Endpoint
      - name: Text Extraction Endpoint
      - name: PDF Generation Endpoint
      - name: Dedicated Support
  - id: snapapi-one-time-500
    name: One-Time 500 Requests
    type: paid
    description: >-
      Non-subscription bundle promoted on the pricing page. 500 additional
      requests for a one-time $5 charge, no recurring billing.
    entries:
      - label: One-Time Request Bundle
        description: Single-purchase request bundle, no monthly renewal
        name: api_requests
        type: prepaid
        metric: requests
        limit: 500
        timeFrame: lifetime
        geo: global
        domains:
          - https://snap.michaelcli.com
        unit: 500
        price: '5.00'
        priceCurrency: USD
        billingPeriod: one-time
        purchaseUrl: https://buy.stripe.com/28E9AV7UZ93Y4jj7UNbwk04
        userMultiplied: false
    elements:
      - name: One-Time Stripe Checkout
      - name: All Four Endpoints
maintainers:
